{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
{{ include "epinio.labels" . | indent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    - name: {{ .Release.Name }}-http
      protocol: HTTP
      port: {{ .Values.gateway.ports.http }}
      hostname: {{ .Values.hostname }}
      allowedRoutes:
        namespaces:
          from: Same
{{- if .Values.gateway.tls.terminate }}
    - name: {{ .Release.Name }}-https
      protocol: HTTPS
      port: {{ .Values.gateway.ports.https }}
      hostname: {{ .Values.hostname }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.gateway.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
    {{- range .Values.gateway.additionalListeners }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      {{- if .hostname }}
      hostname: {{ .hostname | quote }}
      {{- end }}
      {{- if .tls }}
      tls:
        mode: {{ .tls.mode }}
        {{- if .tls.certificateRefs }}
        certificateRefs:
          {{- range .tls.certificateRefs }}
          - name: {{ .name }}
            kind: {{ .kind | default "Secret" }}
            {{- if .namespace }}
            namespace: {{ .namespace }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end }}