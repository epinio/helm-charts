{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
{{ include "epinio.labels" . | indent 4 }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      namespace: {{ .Release.Namespace }}
    {{- if not .Values.gateway.tls.terminate }}
      # TLS terminates at k8s: attach to HTTPS listeners (redirect route handles HTTP)
      sectionName: {{ .Release.Name }}-https
    {{- else }}
      # TLS is external: attach to HTTP listeners (no redirect route)
      sectionName: {{ .Release.Name }}-http
    {{- end }}
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /wapi
        - path:
            type: Exact
            value: /ready
      backendRefs:
        # TODO: Add service name variable & fix service manifest to respect port value
        - name: epinio-server
          port: 80 # {{ .Values.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # TODO: Add service name variable & fix service manifest to respect port value
        - name: epinio-ui
          port: 80 # {{ .Values.epinioUI.service.port }}
---
{{- if not .Values.gateway.tls.terminate -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-https-redirect
  labels:
{{ include "epinio.labels" . | indent 4 }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      namespace: {{ .Release.Namespace }}
      sectionName: {{ .Release.Name }}-http
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
{{- end }}
