---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
{{ $registryURL := include "epinio.registry-url" . }}
{{ $stagingRegistryHostOverride := default "" .Values.server.stagingWorkloads.registryHostOverride }}
metadata:
  annotations:
    epinio.io/registry-namespace: {{ .Values.global.registryNamespace }}
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: ""  # Empty = all namespaces
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: ""  # Auto-create mirrors in all namespaces
  name: registry-creds
  namespace: {{ .Release.Namespace }}
stringData:
  .dockerconfigjson: |-
    {
      "auths": {
        "{{ $registryURL }}": {
          "auth":"{{ printf "%s:%s" .Values.global.registryUsername .Values.global.registryPassword | b64enc }}",
          "username":"{{ .Values.global.registryUsername }}",
          "password":"{{ .Values.global.registryPassword }}"
        } {{- if and .Values.containerregistry.enabled (ne $registryURL "127.0.0.1:30500") }} ,
        "127.0.0.1:30500": {
          "auth":"{{ printf "%s:%s" .Values.global.registryUsername .Values.global.registryPassword | b64enc }}",
          "username":"{{ .Values.global.registryUsername }}",
          "password":"{{ .Values.global.registryPassword }}"
        }
        {{- end }}{{- if and $stagingRegistryHostOverride (ne $stagingRegistryHostOverride $registryURL) (ne $stagingRegistryHostOverride "127.0.0.1:30500") }} ,
        "{{ $stagingRegistryHostOverride }}": {
          "auth":"{{ printf "%s:%s" .Values.global.registryUsername .Values.global.registryPassword | b64enc }}",
          "username":"{{ .Values.global.registryUsername }}",
          "password":"{{ .Values.global.registryPassword }}"
        }
        {{- end -}}
      }
    }
